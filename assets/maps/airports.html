<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { height: 100%; width: 100%; }
        .legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            line-height: 1.4;
            font-size: 12px;
            color: #222;
        }
        .legend .title {
            font-weight: 600;
            margin-bottom: 6px;
        }
        .legend-subtitle {
            font-size: 11px;
            color: #555;
            margin-bottom: 6px;
        }
        .legend-scale {
            width: 170px;
            height: 10px;
            border-radius: 999px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            background: linear-gradient(90deg, #22c55e 0%, #2563eb 25%, #facc15 50%, #f97316 75%, #ef4444 100%);
        }
        .legend-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            center: [35, 110],
            zoom: 3,
            worldCopyJump: false,
            maxBounds: [[-90, -180], [90, 180]],
            maxBoundsViscosity: 1.0
        });
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            noWrap: true
        }).addTo(map);

        var airports = [
            {code: "CAN", name: "Guangzhou Baiyun", lat: 23.3924, lng: 113.2988},
            {code: "CSX", name: "Changsha Huanghua", lat: 28.1892, lng: 113.2200},
            {code: "CTU", name: "Chengdu Shuangliu", lat: 30.5785, lng: 103.9471},
            {code: "DCA", name: "Washington Reagan", lat: 38.8512, lng: -77.0402},
            {code: "DLC", name: "Dalian Zhoushuizi", lat: 38.9657, lng: 121.5386},
            {code: "DOY", name: "Dongying Shengli", lat: 37.5086, lng: 118.7889},
            {code: "HAK", name: "Haikou Meilan", lat: 19.9349, lng: 110.4590},
            {code: "HET", name: "Hohhot Baita", lat: 40.8514, lng: 111.8242},
            {code: "ICN", name: "Seoul Incheon", lat: 37.4602, lng: 126.4407},
            {code: "JFK", name: "New York JFK", lat: 40.6413, lng: -73.7781},
            {code: "KIX", name: "Osaka Kansai", lat: 34.4347, lng: 135.2441},
            {code: "KHG", name: "Kashgar Laining", lat: 39.5429, lng: 76.0195},
            {code: "KUL", name: "Kuala Lumpur International", lat: 2.7456, lng: 101.7072},
            {code: "LAX", name: "Los Angeles", lat: 33.9416, lng: -118.4085},
            {code: "LHW", name: "Lanzhou Zhongchuan", lat: 36.5152, lng: 103.6202},
            {code: "PEK", name: "Beijing Capital", lat: 40.0799, lng: 116.6031},
            {code: "PKX", name: "Beijing Daxing", lat: 39.5098, lng: 116.4105},
            {code: "PVG", name: "Shanghai Pudong", lat: 31.1443, lng: 121.8083},
            {code: "SFO", name: "San Francisco", lat: 37.6213, lng: -122.3790},
            {code: "SHA", name: "Shanghai Hongqiao", lat: 31.1979, lng: 121.3363},
            {code: "SHE", name: "Shenyang Taoxian", lat: 41.6398, lng: 123.4834},
            {code: "SIN", name: "Singapore Changi", lat: 1.3644, lng: 103.9915},
            {code: "SQD", name: "Shangrao Sanqingshan", lat: 28.3797, lng: 117.9643},
            {code: "SZX", name: "Shenzhen Bao'an", lat: 22.6393, lng: 113.8107},
            {code: "TAO", name: "Qingdao Jiaodong", lat: 36.2661, lng: 120.3744},
            {code: "TFU", name: "Chengdu Tianfu", lat: 30.3137, lng: 104.4451},
            {code: "TNA", name: "Jinan Yaoqiang", lat: 36.8572, lng: 117.2156},
            {code: "TSN", name: "Tianjin Binhai", lat: 39.1244, lng: 117.3462},
            {code: "TYN", name: "Taiyuan Wusu", lat: 37.7469, lng: 112.6283},
            {code: "WUH", name: "Wuhan Tianhe", lat: 30.7838, lng: 114.2081},
            {code: "XMN", name: "Xiamen Gaoqi", lat: 24.5440, lng: 118.1277},
            {code: "YCU", name: "Yuncheng Zhangxiao", lat: 35.1164, lng: 111.0314}
        ];

        var airportTraffic = {
            CAN: 7,
            CSX: 1,
            CTU: 2,
            DCA: 2,
            DLC: 43,
            DOY: 17,
            HAK: 1,
            HET: 2,
            ICN: 4,
            JFK: 2,
            KHG: 2,
            KIX: 2,
            KUL: 2,
            LAX: 4,
            LHW: 2,
            PEK: 4,
            PKX: 2,
            PVG: 12,
            SFO: 2,
            SHA: 2,
            SHE: 1,
            SIN: 2,
            SQD: 1,
            SZX: 3,
            TAO: 1,
            TFU: 1,
            TNA: 12,
            TSN: 1,
            TYN: 2,
            WUH: 4,
            XMN: 1,
            YCU: 2
        };

        var trafficValues = Object.keys(airportTraffic).map(function(code) {
            return airportTraffic[code];
        });
        var minTraffic = Math.min.apply(null, trafficValues);
        var maxTraffic = Math.max.apply(null, trafficValues);

        var colorStops = [
            {t: 0.0, rgb: [34, 197, 94]},
            {t: 0.25, rgb: [37, 99, 235]},
            {t: 0.5, rgb: [250, 204, 21]},
            {t: 0.75, rgb: [249, 115, 22]},
            {t: 1.0, rgb: [239, 68, 68]}
        ];

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function rgbToHex(rgb) {
            return '#' + rgb.map(function(v) {
                var h = Math.round(v).toString(16);
                return h.length === 1 ? '0' + h : h;
            }).join('');
        }

        function interpolateColor(count) {
            if (maxTraffic === minTraffic) {
                return rgbToHex(colorStops[colorStops.length - 1].rgb);
            }

            var t = clamp((count - minTraffic) / (maxTraffic - minTraffic), 0, 1);
            for (var i = 0; i < colorStops.length - 1; i++) {
                var left = colorStops[i];
                var right = colorStops[i + 1];
                if (t >= left.t && t <= right.t) {
                    var localT = (t - left.t) / (right.t - left.t);
                    var rgb = [0, 1, 2].map(function(idx) {
                        return left.rgb[idx] + (right.rgb[idx] - left.rgb[idx]) * localT;
                    });
                    return rgbToHex(rgb);
                }
            }
            return rgbToHex(colorStops[colorStops.length - 1].rgb);
        }

        function createPinSvg(hexColor) {
            return '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="42" viewBox="0 0 30 42">' +
                '<path d="M15 1C7.27 1 1 7.27 1 15c0 10.39 14 26 14 26s14-15.61 14-26C29 7.27 22.73 1 15 1z" fill="' + hexColor + '" stroke="#ffffff" stroke-width="2"/>' +
                '<circle cx="15" cy="15" r="5.5" fill="rgba(255,255,255,0.92)"/>' +
                '</svg>';
        }

        var markerIcons = {};
        function getMarkerIcon(count) {
            var hexColor = interpolateColor(count);
            if (!markerIcons[hexColor]) {
                markerIcons[hexColor] = new L.Icon({
                    iconUrl: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(createPinSvg(hexColor)),
                    iconSize: [30, 42],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    className: 'airport-pin-icon'
                });
            }
            return markerIcons[hexColor];
        }

        airports.forEach(function(airport) {
            var count = airportTraffic[airport.code] || 0;
            L.marker([airport.lat, airport.lng])
                .setIcon(getMarkerIcon(count))
                .addTo(map)
                .bindPopup("<b>" + airport.code + "</b><br>" + airport.name + "<br>Departures + Arrivals: " + count);
        });

        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML =
                '<div class="title">Airport Visits</div>' +
                '<div class="legend-subtitle">Departures + Arrivals</div>' +
                '<div class="legend-scale"></div>' +
                '<div class="legend-labels"><span>Low (' + minTraffic + ')</span><span>High (' + maxTraffic + ')</span></div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
